<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>TEAM MANIACS</title>
  <link rel="stylesheet" href="styles.css" />
  <script type="module" src="app.js?v=13"></script>
</head>
<body>
<header class="app-header">
  <div class="container row between center wrap">
    <div class="row center gap-12">
      <div class="logo">
        <img src="Maniacs_Logo_w.png" alt="Logo" />
      </div>
      <h1 class="app-title">TEAM MANIACS <span class="muted">· STATS</span></h1>
    </div>
    <div class="row center gap-8">
      <span id="user-info" class="muted"></span>
      <span id="role-badge" class="role-badge hidden" aria-label="Admin" title="Admin">👑 Admin</span>
      <form id="login-form" class="row center gap-8" autocomplete="on" aria-label="Login Formular">
        <input id="login-email" type="email" placeholder="E-Mail" required />
        <input id="login-pass" type="password" placeholder="Passwort" required />
        <button type="submit" class="btn">Login</button>
      </form>
      <button id="btn-logout" class="btn ghost hidden">Logout</button>
    </div>
  </div>
</header>

<main class="container">

  <!-- Spieler Modal (Player anlegen) -->
  <dialog id="player-modal" aria-labelledby="player-modal-title">
    <form id="player-form" method="dialog" class="modal" aria-label="Player anlegen">
      <h3 id="player-modal-title">Neuer Player</h3>
      <input id="p-name" type="text" placeholder="Name" required aria-label="Name" />
      <input id="p-decks" type="text" placeholder="Decks (kommagetrennt)" aria-label="Decks" />
      <div class="row end gap-8">
        <button class="btn ghost" type="button" onclick="this.closest('dialog').close()">Abbrechen</button>
        <button class="btn" type="submit">Speichern</button>
      </div>
    </form>
  </dialog>

  <!-- Player Management Bereich -->
  <section id="view-players" class="view active" aria-labelledby="players-title">
    <div class="row" style="gap:8px; margin-bottom:8px;">
      <button class="btn hidden" id="btn-open-player">+ Player</button>
    </div>
    <div class="card">
      <div class="table-wrap">
        <table id="players-table" aria-label="Players Tabelle">
          <thead>
            <tr>
              <th>Name</th>
              <th>Record</th>
              <th>Top 8</th>
              <th>Decks</th>
              <th></th>
            </tr>
          </thead>
          <tbody></tbody>
        </table>
      </div>
    </div>
  </section>

  <!-- Match Erfassen -->
  <section id="view-matches" class="view" aria-labelledby="matches-title">
    <div class="card" id="matches-form-card">
      <h3 id="matches-title">Match erfassen</h3>
      <form id="match-form" class="form-grid" aria-label="Match erfassen">
        <input type="date" id="m-date" aria-label="Datum" />
        <select id="m-player" aria-label="Player auswählen" required></select>
        <input type="text" id="m-deck" placeholder="Deck" aria-label="Deck" />
        <input type="text" id="m-opp" placeholder="Gegner" aria-label="Gegner" />
        <select id="m-res" aria-label="Ergebnis">
          <option value="W">Win</option>
          <option value="L">Loss</option>
          <option value="D">Draw</option>
        </select>
        <select id="m-tier" aria-label="Event-Level">
          <option value="L">Local</option>
          <option value="R">Regional</option>
          <option value="I">International</option>
          <option value="C">Challenge</option>
          <option value="S">Special</option>
          <option value="W">Worlds</option>
        </select>
        <input type="text" id="m-event" placeholder="Event (z. B. Frankfurt Regionals)" aria-label="Event-Notiz" />
        <button type="submit" class="btn">Speichern</button>
      </form>
    </div>
  </section>

</main>
</body>
</html>
